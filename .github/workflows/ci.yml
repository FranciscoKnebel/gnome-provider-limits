name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Run checks + tests with coverage
        id: tests
        run: |
          npm run check 2>&1 | tee /tmp/ci-output.txt

      - name: Coverage summary
        if: always()
        run: |
          {
            echo "## CI Results"
            echo ""
            echo '```'
            awk '/^[-|]/,0' /tmp/ci-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: coverage/lcov.info
