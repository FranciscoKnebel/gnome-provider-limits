name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  release:
    needs: check
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Compile schemas
        run: glib-compile-schemas src/schemas

      - name: Pack extension
        run: |
          gnome-extensions pack dist/ -o dist/ \
            --schema src/schemas/org.gnome.shell.extensions.gnome-provider-limits.gschema.xml \
            --podir src/po \
            --gettext-domain gnome-provider-limits

      - name: Upload release artifact
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.zip
