name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  check:
    uses: ./.github/workflows/checks.yml

  coverage:
    needs: check
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: coverage

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: cobertura-coverage.xml
          format: markdown
          output: file
          badge: true

      - name: Add coverage to step summary
        if: always()
        run: |
          if [ -f code-coverage-results.md ]; then
            cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: code-coverage-results.md

  gh-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: coverage
    runs-on: ubuntu-26.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: coverage

      - name: Generate badge JSON
        run: |
          LINE_PCT=$(awk -F'[, ]+' '/^DA:/ { total++; if ($2 > 0) covered++ } END { if (total > 0) printf "%.0f", covered/total*100 }' lcov.info)
          COLOR=$([ "$LINE_PCT" -ge 90 ] && echo "brightgreen" || [ "$LINE_PCT" -ge 80 ] && echo "green" || [ "$LINE_PCT" -ge 70 ] && echo "yellowgreen" || [ "$LINE_PCT" -ge 60 ] && echo "yellow" || echo "red")
          mkdir -p public
          cat > public/coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${LINE_PCT}%",
            "color": "${COLOR}"
          }
          EOF

      - name: Copy site files
        run: |
          cp README.md index.md _config.yml Gemfile public/

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          jekyll: true
          token: ${{ secrets.GITHUB_TOKEN }}
