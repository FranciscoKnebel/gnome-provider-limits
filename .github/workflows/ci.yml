name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  check:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Run checks
        run: npm run check

      - name: Coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/lcov.info
          format: lcov
          output: file
          badge: true

      - name: Add coverage to step summary
        if: always()
        run: |
          if [ -f code-coverage-results.md ]; then
            cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: code-coverage-results.md

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-lcov
          path: coverage/lcov.info

  coverage-badge:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          name: coverage-lcov

      - name: Generate badge JSON
        run: |
          LINE_PCT=$(awk -F'[, ]+' '/^DA:/ { covered += $3; total++ } END { if (total > 0) printf "%.0f", covered/total*100 }' lcov.info)
          COLOR=$([ "$LINE_PCT" -ge 90 ] && echo "brightgreen" || [ "$LINE_PCT" -ge 80 ] && echo "green" || [ "$LINE_PCT" -ge 70 ] && echo "yellowgreen" || [ "$LINE_PCT" -ge 60 ] && echo "yellow" || echo "red")
          mkdir -p public
          cat > public/coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${LINE_PCT}%",
            "color": "${COLOR}"
          }
          EOF

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: false
