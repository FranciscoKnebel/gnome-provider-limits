name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  check:
    runs-on: ubuntu
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Run checks
        run: npm run check

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/lcov.info
          format: lcov
          output: file
          output-file: /tmp/coverage-summary.md
          badge: true

      - name: Add coverage to step summary
        if: always()
        run: cat /tmp/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: /tmp/coverage-summary.md

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-lcov
          path: coverage/lcov.info
