name: Checks

on:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Run checks
        run: npm run check

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/
